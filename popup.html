<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: Arial, sans-serif; padding: 10px; background-color: #0f172a; color: white; }
    h3 { margin-top: 0; color: #3b82f6; }
    label { font-size: 12px; color: #94a3b8; display: block; margin: 8px 0 4px; }
    input { width: 90%; padding: 6px; border: 1px solid #334155; background: #1e293b; color: white; border-radius: 4px; }
    button { width: 95%; margin-top: 12px; background: #2563eb; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1d4ed8; }
    #status { font-size: 11px; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>Save Job Listing</h3>
  
  <label>Company</label>
  <input type="text" id="company" placeholder="Loading...">
  
  <label>Position / Role</label>
  <input type="text" id="role" placeholder="Loading...">
  
  <button id="saveBtn">Log to Dashboard</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
